server:
  port: 8081
spring:
  application:
    name: auth-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/battery_passport}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}

battery:
  jwt:
    secret: ${JWT_SECRET:BatteryPassportJwtSecretKeyForDev2026}
    expiration-ms: 86400000
  sso:
    provider: ${SSO_PROVIDER:trina}
    trina:
      protocol: ${TRINA_SSO_PROTOCOL:OIDC}
      iam-server-url: ${TRINA_IAM_URL:https://iam.trinasolar.com}
      client-id: ${TRINA_IAM_CLIENT_ID:battery-passport}
      client-secret: ${TRINA_IAM_CLIENT_SECRET:}
      redirect-uri: ${TRINA_IAM_REDIRECT_URI:https://battery.trinasolar.com/api/v1/auth/callback}
      scope: ${TRINA_IAM_SCOPE:openid profile email}
      response-type: ${TRINA_IAM_RESPONSE_TYPE:code}
      cas-server-url: ${TRINA_CAS_URL:https://cas.trinasolar.com}
      cas-service-url: ${TRINA_CAS_SERVICE_URL:https://battery.trinasolar.com/api/v1/auth/callback}

---
spring:
  config:
    activate:
      on-profile: saas

battery:
  deploy:
    mode: saas
  sso:
    provider: saas-builtin

---
spring:
  config:
    activate:
      on-profile: onpremise

battery:
  deploy:
    mode: onpremise
  sso:
    provider: ${SSO_PROVIDER:trina}