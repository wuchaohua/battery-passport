 server:
   port: 8084
 spring:
   application:
     name: battery-service
   cloud:
     nacos:
       discovery:
         server-addr: ${NACOS_ADDR:127.0.0.1:8848}
   datasource:
     url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/battery_passport}
     username: ${DB_USER:root}
     password: ${DB_PASSWORD:root}
     # driver-class-name is auto-detected by Spring Boot from JDBC URL
 
 battery:
   plugin:
     scan-path: ${PLUGIN_PATH:/opt/battery/plugins/}
   deploy:
     mode: ${DEPLOY_MODE:onpremise}
 
 ---
 spring:
   config:
     activate:
       on-profile: saas
 battery:
   deploy:
     mode: saas
 
 ---
 spring:
   config:
     activate:
       on-profile: onpremise
 battery:
   deploy:
     mode: onpremise
   sso:
     provider: ${SSO_PROVIDER:trina}
