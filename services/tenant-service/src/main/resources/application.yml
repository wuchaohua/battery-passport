 server:
   port: 8083
 spring:
   application:
     name: tenant-service
   cloud:
     nacos:
       discovery:
         server-addr: ${NACOS_ADDR:127.0.0.1:8848}
   datasource:
     url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/battery_passport}
     username: ${DB_USER:root}
     password: ${DB_PASSWORD:root}
 
 battery:
   deploy:
     mode: ${DEPLOY_MODE:saas}
